services:
  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-frozt-redis-secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-frozt-redis-secret}", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  relay:
    build:
      context: ../..
      dockerfile: frost-zcash/poc-frozt/Dockerfile.relay
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/ping || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 10

  party-1:
    build:
      context: ../..
      dockerfile: frost-zcash/poc-frozt/Dockerfile
    environment:
      - RELAY_URL=http://relay:9090
      - PARTY_ID=party-1
      - IDENTIFIER=1
      - SESSION_ID=${SESSION_ID:-frozt-keygen-001}
      - PARTIES=party-1,party-2
      - MAX_SIGNERS=2
      - MIN_SIGNERS=2
      - OPERATION=${OPERATION:-keygen}
      - KEYSTORE_DIR=/data/keystore
      - SIGN_MESSAGE=${SIGN_MESSAGE:-}
      - SIGNERS=${SIGNERS:-}
      - MNEMONIC=${MNEMONIC:-}
      - EXPECTED_ADDRESS=${EXPECTED_ADDRESS:-}
      - LIGHTWALLETD_ENDPOINT=${LIGHTWALLETD_ENDPOINT:-}
      - RECIPIENT_ADDRESS=${RECIPIENT_ADDRESS:-}
      - SEND_AMOUNT=${SEND_AMOUNT:-}
      - BIRTHDAY=${BIRTHDAY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-deadbeefcafebabe0123456789abcdef0123456789abcdef0123456789abcdef}
      - ZCASH_PARAMS=/zcash-params
    volumes:
      - party-1-data:/data/keystore
      - ${HOME}/.zcash-params:/zcash-params:ro
    depends_on:
      relay:
        condition: service_healthy

  party-2:
    build:
      context: ../..
      dockerfile: frost-zcash/poc-frozt/Dockerfile
    environment:
      - RELAY_URL=http://relay:9090
      - PARTY_ID=party-2
      - IDENTIFIER=2
      - SESSION_ID=${SESSION_ID:-frozt-keygen-001}
      - PARTIES=party-1,party-2
      - MAX_SIGNERS=2
      - MIN_SIGNERS=2
      - OPERATION=${OPERATION:-keygen}
      - KEYSTORE_DIR=/data/keystore
      - SIGN_MESSAGE=${SIGN_MESSAGE:-}
      - SIGNERS=${SIGNERS:-}
      - LIGHTWALLETD_ENDPOINT=${LIGHTWALLETD_ENDPOINT:-}
      - RECIPIENT_ADDRESS=${RECIPIENT_ADDRESS:-}
      - SEND_AMOUNT=${SEND_AMOUNT:-}
      - BIRTHDAY=${BIRTHDAY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-deadbeefcafebabe0123456789abcdef0123456789abcdef0123456789abcdef}
      - ZCASH_PARAMS=/zcash-params
    volumes:
      - party-2-data:/data/keystore
      - ${HOME}/.zcash-params:/zcash-params:ro
    depends_on:
      relay:
        condition: service_healthy

volumes:
  party-1-data:
  party-2-data:
